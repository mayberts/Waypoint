<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Save to Waypoint</title>
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 12px;
        font: 13px -apple-system, system-ui, sans-serif;
        background: #171717;
        color: #e5e5e5;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      .url {
        font-size: 11px;
        color: #a3a3a3;
        margin-bottom: 10px;
        word-break: break-all;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        background: #262626;
        border: 1px solid #404040;
        border-radius: 6px;
        color: #e5e5e5;
        padding: 6px 8px;
        margin-bottom: 8px;
        font-size: 13px;
      }
      button {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 7px;
        font-size: 13px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
      }
      .error {
        color: #f87171;
      }
      .success {
        color: #4ade80;
      }
      a {
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="popup.js"></script>
  </body>
</html>
