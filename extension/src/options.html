<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Waypoint options</title>
    <style>
      body {
        max-width: 420px;
        margin: 40px auto;
        font: 14px -apple-system, system-ui, sans-serif;
        background: #171717;
        color: #e5e5e5;
      }
      h1 {
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #a3a3a3;
        margin: 12px 0 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #262626;
        border: 1px solid #404040;
        border-radius: 6px;
        color: #e5e5e5;
        padding: 7px 9px;
        font-size: 13px;
      }
      button {
        margin-top: 16px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #4ade80;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="options.js"></script>
  </body>
</html>
