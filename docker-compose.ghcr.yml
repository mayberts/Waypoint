# Tier 2 deploy: pull a prebuilt image from GHCR instead of building on the box.
# Replace <youruser> with your lowercase GitHub username/org.
# First run on the host (once), to allow pulling a private package:
#   echo <PAT_with_read:packages> | docker login ghcr.io -u <youruser> --password-stdin
services:
  db:
    container_name: waypoint-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: waypoint
      POSTGRES_DB: waypoint
    volumes:
      - /mnt/user/appdata/waypoint/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    container_name: waypoint
    image: ghcr.io/mayberts/waypoint:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://waypoint:waypoint@db:5432/waypoint
      UPLOADS_DIR: /data/uploads
    volumes:
      - /mnt/user/appdata/waypoint/data:/data
    ports:
      - "8745:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
